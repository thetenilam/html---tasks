<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html List</title>
</head>
<body>
    <h3>unordered List</h3>
    <Ul>
        <li> Apple</li>
        <li> orange</li>
        <li> mango</li>
        <li> pineapple</li>
        <li> lemons</li>
    </Ul>

    <h3>Oredered List</h3>
    <ol type="A">
        <li>one</li>
        <li> two </li>
        <li> three</li>
        <li> four</li>
        <li>five </li>
    </ol>


    <h3>nested list</h3>
    <nl>
        <li>
            <nl>
                <ol>
                    <li>h.1</li>
                    <li>h.2</li>
                </ol>
            </nl>
            <nl></nl>
        </li>

    </nl>


    <h3>data list</h3>

    <dl>
        <dt>ice cream</dt>

        <dd>mango fav</dd>

        <dt>chocolate</dt>
        <dd>orange favour</dd>

    </dl>

    
</body>
</html>
