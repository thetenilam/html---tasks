        <tr>

            <td>45</td>

    </table>
</body>
</html>







Table with colspan

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colspan Example</title>
</head>
<body>
    <table border="2">
        <tr>
            <th colspan="3">Employee Information</th>
        </tr>
    <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Course</th>
    </tr>

    <tr>
        <td>65</td>
        <td>Rutu</td>
        <td>python</td>
    </tr>
    </table>
</body>
</html>



Table with Rowspan

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rowspan Example</title>
</head>
<body>
    <table border="1">

        <tr>
            <th>Name</th>
            <th>Course</th>
        </tr>

        <tr>
            <td rowspan="2">Nilam</td>
            <td>AI</td>
        </tr>
        <tr>
            <td>CSS</td>
        </tr>

    </table>
        
</body>
</html>
